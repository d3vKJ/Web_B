<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="product-card">
        <figure class="product-card__image">
            <img src="phone.png" alt="삼성전자 갤럭시 S 25 512GB 아이스 블루">
        </figure>

        <section class="product-card__info">
            <p class="shipping">무료배송</p>

            <h3 class="product-name">삼성전자 갤럭시 S 25 512GB 미개봉 새상품, 아이스 블루</h3>

            <section class="price" aria-label="가격 정보">
                <p class="price__discount">
                    <strong class="price__coupon">쿠폰할인</strong> |
                    <strong class="price__rate">75%</strong>
                    <del class="price__original">1,298,000원</del>
                </p>
                <p class="price__sale"><strong>316,000원</strong></p>
            </section>

            <strong class="delivery">8/13 도착 예정</strong>

            <p class="rating" aria-label="별점 5점, 리뷰 4개">
                <span class="rating__stars" aria-hidden="true">★★★★★</span>
                <span class="rating__count">(4)</span>
            </p>

            <p class="reward">
                <span class="reward__icon" aria-hidden="true">c</span>
                최대 15,800원 적립
            </p>
        </section>
    </article>
</body>
</html>
